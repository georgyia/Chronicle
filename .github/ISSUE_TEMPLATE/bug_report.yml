name: Bug report
description: Report a problem with Chronicle
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please do not include sensitive data from your event database.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `chronicle ...`
        2. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Chronicle version
      description: Output of `chronicle version`.
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Redacted excerpts from `~/Library/Logs/Chronicle/chronicle.log`.
      render: shell
