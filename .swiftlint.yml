# SwiftLint configuration for Chronicle.
# Strict by design: warnings are treated as errors in CI (`swiftlint --strict`).

included:
  - Sources
  - Tests
  - Benchmarks

excluded:
  - .build
  - .swiftpm

analyzer_rules:
  - unused_declaration
  - unused_import

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - missing_docs
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - yoda_condition

disabled_rules:
  - todo # tracked in the issue tracker, not blocking
  - trailing_comma # SwiftFormat owns comma style (--commas always) as the single formatting authority

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 400
  error: 500

type_body_length:
  warning: 300
  error: 400

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 15

function_parameter_count:
  warning: 6
  error: 8

identifier_name:
  min_length: 2
  excluded: [id, db, ok, to, x, y, ts, ip]

missing_docs:
  warning: [public, open]

force_unwrapping:
  severity: error

nesting:
  type_level: 3
